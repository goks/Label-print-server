name: Build And Release Installer

on:
  push:
    tags:
      - "v*"
      - "*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Sync VERSION from tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          Set-Content -Path VERSION -Value $version -NoNewline

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --clean --noconfirm LabelPrintServer.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: LabelPrintServer-setup
          path: Output/LabelPrintServer_Setup.exe

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "Automated build for $tag"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag Output/LabelPrintServer_Setup.exe --title $tag --notes $notes
          } else {
            gh release upload $tag Output/LabelPrintServer_Setup.exe --clobber
          }

      - name: Commit VERSION back to main
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          Set-Content -Path VERSION -Value $env:RELEASE_VERSION -NoNewline
          git diff --quiet -- VERSION
          if ($LASTEXITCODE -ne 0) {
            git add VERSION
            git commit -m "Sync VERSION to $env:RELEASE_VERSION"
            git push origin main
          }
