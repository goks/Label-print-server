name: Build And Release Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --clean --noconfirm LabelPrintServer.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: LabelPrintServer-setup
          path: Output/LabelPrintServer_Setup.exe

      - name: Create or update GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $notes = "Automated build for $tag"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag Output/LabelPrintServer_Setup.exe --title $tag --notes $notes
          } else {
            gh release upload $tag Output/LabelPrintServer_Setup.exe --clobber
          }
